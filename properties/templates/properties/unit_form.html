<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 600px; margin: 2rem auto; }
        .form-label { font-weight: 500; color: #374151; }
    </style>
</head>
<body>
    <div class="container pb-5 pt-4">
        <div class="mb-3 text-center">
            <h3 class="fw-bold">{{ title }}</h3>
            <p class="text-muted">Isi atau perbarui detail blok dan status penjualannya.</p>
        </div>

        <div class="card card-custom p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Proyek Perumahan <span class="text-danger">*</span></label>
                    {{ form.perumahan }}
                    {{ form.perumahan.errors }}
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Kode Blok <span class="text-danger">*</span></label>
                        {{ form.kode_blok }}
                        {{ form.kode_blok.errors }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tipe Rumah <span class="text-danger">*</span></label>
                        {{ form.tipe_rumah }}
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Harga Total (Rp) <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text">Rp</span>
                        {{ form.harga_total }}
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Status Unit <span class="text-danger">*</span></label>
                    {{ form.status }}
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'unit_list' %}" class="btn btn-light">Batal</a>
                    <button type="submit" class="btn btn-primary px-4">Simpan Data Properti</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
