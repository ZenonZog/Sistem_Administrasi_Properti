<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfirmasi Hapus Properti</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); max-width: 500px; margin: 4rem auto; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card card-custom p-4">
            <div class="mb-3 text-danger">
                <i class="fa-solid fa-house-circle-xmark fa-3x"></i>
            </div>
            <h4 class="fw-bold text-dark mb-3">Hapus Data Properti?</h4>
            <p class="text-muted mb-4">
                Apakah Anda yakin ingin menghapus data kavling/rumah blok <strong>{{ unit.kode_blok }}</strong>? <br>
                <small class="text-danger fw-medium mt-2 d-block"><i class="fa-solid fa-circle-info"></i> Peringatan: Seluruh riwayat cicilan yang terkait dengan blok ini juga akan terhapus.</small>
            </p>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2 mt-2">
                    <a href="{% url 'unit_list' %}" class="btn btn-light px-4">Batal</a>
                    <button type="submit" class="btn btn-danger px-4">Ya, Hapus Permanen</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
